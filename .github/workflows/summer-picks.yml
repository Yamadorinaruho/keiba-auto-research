name: summer picks

# 夏未勝利牝・本命1点ロジック (cc-memory decision 155)
#  朝   : 対象レースの発走時刻リストを確定 (summer_schedule)
#  巡回 : 毎分。発走1〜15分前の買い目をSlack通知(summer_notify) + 全レース10〜1分前オッズを時系列記録(odds_log)
#  夜   : 本日の収支+オッズ変動をSlack通知 (summer_settle) 単勝1000円/点
# state は state/summer_sched_YYYYMMDD.json に保存しコミットで永続化。
# Cron は UTC (JST = UTC+9)。6/1-8月末の土日のみ実質稼働(新馬は6/1-, 芝/ダは6/16-)。

on:
  schedule:
    - cron: "0 22 * * 5,6"              # 土/日 7:00 JST : 朝(発走時刻リスト)
    - cron: "0 11 * * *"                # 毎日 20:00 JST : 前日プレビュー(翌日対象レース+系統不明警告。開催なしの夜は沈黙)
    - cron: "30 11 * * 6,0"             # 土/日 20:30 JST : 夜(収支)
    # 巡回(notify)は GAの高頻度cronが自走しないため Cloudflare Worker(keiba-trigger)
    # の Cron Trigger から workflow_dispatch で起動する(*/1,*/5,*/10いずれも自走ゼロを実測)。
  workflow_dispatch:
    inputs:
      mode:
        description: "schedule | notify | settle | odds | preview"
        required: true
        default: "notify"
      date:
        description: "YYYYMMDD (空=今日)"
        required: false
        default: ""

permissions:
  contents: write   # state json をコミットして巡回間で共有

concurrency:
  # mode毎に別グループ。巡回(notify)は前の実行をキャンセルせず完走させる(false)。
  # =全レースを処理しきってから次の巡回に進む(後発レースの取りこぼし防止)。直列実行。
  group: summer-picks-${{ github.event.schedule || github.event.inputs.mode || 'manual' }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Tokyo
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }

      - run: pip install requests beautifulsoup4 lxml

      - name: Decide mode & season
        id: m
        run: |
          # モード判定: 起動cron(github.event.schedule)で識別
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            case "${{ github.event.schedule }}" in
              "0 22 * * 5,6")    MODE="schedule" ;;   # 朝
              "0 11 * * *")      MODE="preview" ;;    # 毎日20時: 翌日の対象レースを予告(開催なしは沈黙)
              "30 11 * * 6,0")   MODE="settle" ;;     # 夜
              *)                 MODE="notify" ;;     # 毎分巡回(買い目通知+オッズ記録)
            esac
          fi
          # 稼働期間判定: 6/1〜8/31 (新馬は6/1-, 芝/ダは6/16- とPython側(summer_schedule)で戦略別に絞る)
          MO=$(date +%m); SEASON=no
          if [ "$MO" = "06" ] || [ "$MO" = "07" ] || [ "$MO" = "08" ]; then SEASON=yes; fi
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && SEASON=yes
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "season=$SEASON" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE season=$SEASON"

      - name: Run
        if: steps.m.outputs.season == 'yes'
        run: |
          DATE="${{ github.event.inputs.date }}"; [ -z "$DATE" ] && DATE=$(date +%Y%m%d)
          cd keiba-dashboard
          if [ "${{ steps.m.outputs.mode }}" = "odds" ]; then
            python3 -m live.odds_log "$DATE"          # 全レースのオッズ記録(較正用)
          elif [ "${{ steps.m.outputs.mode }}" = "preview" ]; then
            # 前日20時: 翌日の日付でスケジュール生成(summer_scheduleが未来日付=プレビューと自動判定)
            [ -z "${{ github.event.inputs.date }}" ] && DATE=$(date -d '+1 day' +%Y%m%d)
            python3 -m live.summer_schedule "$DATE"
          else
            python3 -m live.summer_${{ steps.m.outputs.mode }} "$DATE"
          fi

      - name: Commit state
        if: steps.m.outputs.season == 'yes'
        run: |
          cd keiba-dashboard
          # 各globは該当ファイルが無い回がある(朝はodds無し等)。bash -e で落とさないよう個別add+|| true。
          # state全体(netkeiba_cache等)はaddしない。対象jsonのみ。
          for pat in summer_sched_ odds_races_; do
            git add state/${pat}*.json 2>/dev/null || true
          done
          git add state/odds_log_*.tsv 2>/dev/null || true   # オッズ記録は追記TSV(マージ安全)
          git add state/bankroll.json 2>/dev/null || true
          if [ -n "$(git diff --cached --name-only)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git commit -m "summer picks state $(date +%F\ %H:%M)" || true
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            git push || true
          fi
