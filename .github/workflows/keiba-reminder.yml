name: keiba reminder
# 競馬実運用の通知のみ自動化 (実際の picks/settle 実行は Mac launchd 側)
# Cron は UTC。JST = UTC + 9
#  土 09:30 JST = 土 00:30 UTC  土朝chain前リマインダ
#  日 08:00 JST = 日 23:00 UTC(土)  日朝reminder

on:
  schedule:
    - cron: "30 0 * * 6"   # 土 09:30 JST  saturday-am chain前リマインダ
    - cron: "0 23 * * 6"   # 日 08:00 JST  日朝picks reminder
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send reminder to Slack
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "SLACK_WEBHOOK_URL secret 未設定" && exit 1
          fi

          DOW=$(date -u +%w)
          # date -u: 0=Sun 6=Sat
          if [ "$DOW" = "6" ]; then
            MSG=":bell: *土朝リマインダ* (09:30)\n• entries_<日付>.csv が data/csv/ に置いてあるか確認\n• 10:00 に Mac launchd が picks chain を自動実行します\n• 結果(Sat+Sun の全picks)が Slack に届きます"
          elif [ "$DOW" = "0" ]; then
            MSG=":bell: *日朝リマインダ* (08:00)\n• 今日のpicksは昨日の通知を確認\n• 即PATで複勝投票"
          else
            MSG=":bell: 不明な曜日 ($DOW)"
          fi

          curl -sX POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"$MSG\"}" \
            "$WEBHOOK"
